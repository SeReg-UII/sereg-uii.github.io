<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome 6 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />

  {% seo %}
</head>

<body>
  <!-- ============================================================ NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light sticky-top" id="main-nav">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/img/logo/logo_sereg.png' | relative_url }}"
             alt="{{ site.title }} logo"
             class="navbar-logo" />
        {{ site.title }}
      </a>
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link{% if page.url == '/' or page.url == '/about/' %} active{% endif %}"
               href="{{ '/' | relative_url }}">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link{% if page.url contains 'research' %} active{% endif %}"
               href="{{ '/research/' | relative_url }}">Research</a>
          </li>

          <li class="nav-item">
            <a class="nav-link{% if page.url contains 'publications' %} active{% endif %}"
               href="{{ '/publications/' | relative_url }}">Publications</a>
          </li>

          <li class="nav-item">
            <a class="nav-link{% if page.url contains 'gallery' %} active{% endif %}"
               href="{{ '/gallery/' | relative_url }}">Gallery</a>
          </li>

          <li class="nav-item">
            <a class="nav-link{% if page.url contains 'team' %} active{% endif %}"
               href="{{ '/team/' | relative_url }}">Team</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>
  <!-- ============================================================ /NAVBAR -->

  <!-- ============================================================ MAIN -->
  <main class="page-content">
    {{ content }}
  </main>
  <!-- ============================================================ /MAIN -->

  <!-- ============================================================ FOOTER -->
  <footer class="site-footer mt-auto py-4">
    <div class="container text-center">
      <p class="footer-text mb-1">
        {{ site.title }} &copy; {{ "now" | date: "%Y" }}
      </p>
      <p class="footer-text text-muted small mb-0">
        {{ site.author.department }}, {{ site.author.institution }}<br/>
        Built with <a href="https://jekyllrb.com/" target="_blank" rel="noopener">Jekyll</a> ·
        Hosted on <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a>
      </p>
    </div>
  </footer>
  <!-- ============================================================ /FOOTER -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
