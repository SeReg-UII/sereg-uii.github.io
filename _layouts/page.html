---
layout: default
---

<div class="container py-5">
  {% if page.title %}
  <div class="row mb-4">
    <div class="col-12">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page-subtitle text-muted">{{ page.description }}</p>
      {% endif %}
      <hr class="title-divider" />
    </div>
  </div>
  {% endif %}

  <div class="row">
    <div class="col-12 col-lg-10 mx-auto">
      {{ content }}
    </div>
  </div>
</div>
